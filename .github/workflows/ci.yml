name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches:
      - main
      - "codex/**"

jobs:
  test:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: discord-alumni-reminder-bot/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r discord-alumni-reminder-bot/requirements.txt

      - name: Compile bot
        run: python -m py_compile discord-alumni-reminder-bot/bot.py

      - name: Run tests
        run: python -m unittest discover -s discord-alumni-reminder-bot/tests
